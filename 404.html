<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Preserve the path that resulted in the 404
      var pathSegmentToKeep = window.location.pathname.split('/').slice(2).join('/');
      // Redirect to the base path
      window.location.replace('/student-dashboard/?/' + pathSegmentToKeep + window.location.search + window.location.hash);
    </script>
  </head>
  <body>
  </body>
</html>
